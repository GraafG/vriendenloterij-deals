name: Scrape and Deploy Deals

on:
  schedule:
    # Daily full refresh. The workflow detects which provider to run from the repo name.
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip scraping - redeploy current data/UI only'
        type: boolean
        default: false
      backfill_meta:
        description: 'Tripper only: re-fetch cached deal pages to populate image_url and review_count'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: scrape-and-deploy
  cancel-in-progress: false

jobs:
  scrape:
    if: ${{ github.event.inputs.deploy_only != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Detect provider
        id: provider
        run: |
          if [ "$GITHUB_REPOSITORY" = "GraafG/vriendenloterij-deals" ]; then
            echo "id=vriendenloterij" >> "$GITHUB_OUTPUT"
          else
            echo "id=tripper" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Tripper scraper
        if: ${{ steps.provider.outputs.id == 'tripper' }}
        run: python tripper_scraper.py

      - name: Backfill Tripper image + review meta
        if: ${{ steps.provider.outputs.id == 'tripper' && github.event.inputs.backfill_meta == 'true' }}
        run: python tripper_scraper.py --backfill-meta

      - name: Build Tripper price history
        if: ${{ steps.provider.outputs.id == 'tripper' }}
        run: python build_history.py

      - name: Run VriendenLoterij scraper
        if: ${{ steps.provider.outputs.id == 'vriendenloterij' }}
        run: python providers/vriendenloterij/scraper.py

      - name: Build VriendenLoterij offer history
        if: ${{ steps.provider.outputs.id == 'vriendenloterij' }}
        run: python providers/vriendenloterij/build_history.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.provider.outputs.id }}" = "vriendenloterij" ]; then
            git add providers/vriendenloterij/data/
            message="Update VriendenLoterij offers $(date -u +%Y-%m-%d)"
          else
            git add data/ geocache.json dealcache.json
            message="Update Tripper deals $(date -u +%Y-%m-%d)"
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$message"
            git pull --rebase origin main
            git push
          fi

  deploy:
    needs: scrape
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Detect provider
        id: provider
        run: |
          if [ "$GITHUB_REPOSITORY" = "GraafG/vriendenloterij-deals" ]; then
            echo "id=vriendenloterij" >> "$GITHUB_OUTPUT"
          else
            echo "id=tripper" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build:${{ steps.provider.outputs.id }}
        env:
          ASTRO_TELEMETRY_DISABLED: '1'

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
