name: Scrape Tripper Deals

on:
  schedule:
    # Every day at 08:00 UTC (09:00 CET winter / 10:00 CEST summer)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip scraping – redeploy current data/UI only'
        type: boolean
        default: false
      backfill_meta:
        description: 'Re-fetch all cached deal pages to populate image_url and review_count'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: scrape-and-deploy
  cancel-in-progress: false

jobs:
  scrape:
    if: ${{ github.event.inputs.deploy_only != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python tripper_scraper.py

      - name: Backfill image + review meta (if requested)
        if: ${{ github.event.inputs.backfill_meta == 'true' }}
        run: python tripper_scraper.py --backfill-meta

      - name: Build price history
        run: python build_history.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ geocache.json dealcache.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update deals $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

  deploy:
    needs: scrape
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: '1'

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
